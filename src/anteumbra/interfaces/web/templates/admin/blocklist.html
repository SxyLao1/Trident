<!-- v1.9.0: IP Block Audit Ledger -->
<div style="display: flex; flex-direction: column; gap: 16px; padding: 16px;">
  <h3 style="color: #00ff41; font-family: var(--font-mono); margin: 0; font-size: 15px;">
    ◉ IP BLOCK LEDGER — Audit & Export
  </h3>

  <!-- Manual Block/Unblock Panel -->
  <div class="card" style="display:flex;flex-direction:column;">
    <div class="card-header"><span class="card-header-icon">◆</span> MANUAL BLOCK / UNBLOCK</div>
    <div class="card-body" style="padding:12px;display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;gap:10px;">
        <div style="flex:1;">
          <textarea id="bl-ip-input" class="form-input" placeholder="IP addresses, one per line" rows="3"
                    style="width:100%;font-family:var(--font-mono);font-size:11px;resize:vertical;"></textarea>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;min-width:140px;">
          <button class="btn btn-danger btn-sm" style="font-size:11px;padding:6px 12px;" onclick="manualBlock()">Block</button>
          <button class="btn btn-success btn-sm" style="font-size:11px;padding:6px 12px;" onclick="manualUnblock()">Unblock</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:10px;color:#888;">Devices:</span>
        <span id="bl-device-toggles" style="display:flex;gap:4px;flex-wrap:wrap;">Loading...</span>
        <span style="flex:1;"></span>
        <input type="text" id="bl-reason-input" class="form-input" placeholder="Reason / comment (optional)"
               style="width:250px;font-size:10px;padding:3px 6px;">
      </div>
      <div id="bl-result" style="display:none;background:#050505;border:1px solid #1a1a1a;border-radius:4px;padding:8px;max-height:150px;overflow-y:auto;font-size:10px;font-family:var(--font-mono);color:#888;"></div>
    </div>
  </div>

  <!-- Stats Bar -->
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    <div class="stat-card" style="background:#0a0a0a; border:1px solid #00ff41; border-radius:4px; padding:12px; text-align:center;">
      <div style="color:#00ff41;font-size:22px;font-weight:bold;" id="ledger-stat-total">—</div>
      <div style="color:#888;font-size:10px;">Total</div>
    </div>
    <div class="stat-card" style="background:#0a0a0a; border:1px solid #ffaa00; border-radius:4px; padding:12px; text-align:center;">
      <div style="color:#ffaa00;font-size:22px;font-weight:bold;" id="ledger-stat-auto">—</div>
      <div style="color:#888;font-size:10px;">Auto</div>
    </div>
    <div class="stat-card" style="background:#0a0a0a; border:1px solid #888; border-radius:4px; padding:12px; text-align:center;">
      <div style="color:#888;font-size:22px;font-weight:bold;" id="ledger-stat-manual">—</div>
      <div style="color:#888;font-size:10px;">Manual</div>
    </div>
    <div class="stat-card" style="background:#0a0a0a; border:1px solid #ff4444; border-radius:4px; padding:12px; text-align:center;">
      <div style="color:#ff4444;font-size:22px;font-weight:bold;" id="ledger-stat-today">—</div>
      <div style="color:#888;font-size:10px;">Today</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#050505;border:1px solid #1a1a1a;border-radius:4px;flex-wrap:wrap;">
    <button class="btn btn-sm ledger-filter active" style="font-size:10px;padding:3px 8px;color:#00ff41;border-bottom:2px solid #00ff41;" onclick="loadLedger('all')" id="filter-all">All</button>
    <button class="btn btn-sm ledger-filter" style="font-size:10px;padding:3px 8px;" onclick="loadLedger('auto')" id="filter-auto">Auto</button>
    <button class="btn btn-sm ledger-filter" style="font-size:10px;padding:3px 8px;" onclick="loadLedger('manual')" id="filter-manual">Manual</button>
    <span style="color:#1a1a1a;">|</span>
    <input type="text" class="form-input" style="width:180px;font-size:10px;padding:3px 6px;" placeholder="Search IP/reason..."
           onkeyup="ledgerSearch(this.value)" id="ledger-search">
    <span style="flex:1;"></span>
    <button class="btn btn-ghost btn-sm" style="font-size:10px;padding:3px 8px;" onclick="exportLedger('json')">Export JSON</button>
    <button class="btn btn-ghost btn-sm" style="font-size:10px;padding:3px 8px;" onclick="exportLedger('csv')">Export CSV</button>
    <button class="btn btn-ghost btn-sm" style="font-size:10px;padding:3px 8px;" onclick="loadLedger(window._ledgerFilter||'all')">↻ Refresh</button>
  </div>

  <!-- Table -->
  <div style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px;overflow:hidden;flex:1;min-height:0;">
    <div style="max-height:60vh;overflow-y:auto;" id="ledger-table-wrapper">
      <table style="width:100%;font-size:11px;border-collapse:collapse;" id="ledger-table">
        <thead>
          <tr style="border-bottom:1px solid #1a1a1a;color:#888;font-size:10px;position:sticky;top:0;background:#0a0a0a;">
            <th style="padding:6px 10px;text-align:left;">IP</th>
            <th style="padding:6px 10px;text-align:center;width:50px;">Source</th>
            <th style="padding:6px 10px;text-align:left;">Reason</th>
            <th style="padding:6px 10px;text-align:left;">Notes</th>
            <th style="padding:6px 10px;text-align:left;">Blocked At</th>
            <th style="padding:6px 10px;text-align:center;width:50px;">Status</th>
          </tr>
        </thead>
        <tbody id="ledger-tbody">
          <tr><td colspan="6" style="padding:24px;text-align:center;color:#888;">
            <div class="spinner"></div><p>Loading ledger...</p>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Pagination -->
  <div id="ledger-pagination" style="display:flex;align-items:center;justify-content:center;gap:8px;font-size:10px;color:#888;"></div>
</div>

<!-- v1.9.0: Ledger JS in dashboard.js (innerHTML-safe) -->

<div style="max-width: 560px; margin: 0 auto;">
  <div class="card">
    <div class="card-header" style="justify-content: center;">
      <span style="font-size: 16px;">🔐 Change Admin Password</span>
    </div>
    <div class="card-body">
      <p style="text-align: center; color: var(--color-text-muted); font-size: 12px; margin-bottom: 20px;">
        Session will be invalidated immediately after password change
      </p>

      {% if error %}
      <div class="login-error" style="margin-bottom: 20px;">
        <span>⚠</span> <span>{{ error }}</span>
      </div>
      {% endif %}

      {% if success %}
      <div style="background: rgba(0,255,65,0.08); border: 1px solid rgba(0,255,65,0.3); border-radius: var(--radius-md); padding: 12px; margin-bottom: 20px; color: var(--color-safe); font-family: var(--font-mono); font-size: 12px; display: flex; align-items: center; gap: 8px;">
        <span>✓</span> <span>{{ success }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/admin/account/password">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input type="password" name="current_password" class="form-input" placeholder="Enter current password" required>
        </div>

        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-input" placeholder="8-64 chars, mixed case + digits + symbols" required>
        </div>

        <div style="font-size: 11px; color: var(--color-text-muted); margin-bottom: 20px; font-family: var(--font-mono);">
          <div style="margin-bottom: 4px;">Requirements:</div>
          <div>○ Length: 8-64 chars</div>
          <div>○ Mixed case + digits + symbols (≥3 types)</div>
          <div>○ Not in top 1000 common passwords</div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-input" placeholder="Re-enter new password" required>
        </div>

        <button type="submit" class="login-btn" style="width: 100%; margin-top: 8px;">UPDATE PASSWORD</button>
      </form>
    </div>
  </div>
</div>

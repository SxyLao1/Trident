<!-- v1.8.4: 安全文件内容查看器（全屏模态框） -->
<div id="file-viewer-modal" class="modal-overlay" style="display:none; z-index:3000;"
     onclick="if(event.target===this)closeFileViewer()">
  <div class="modal-container" style="width:95vw; height:90vh; max-width:1600px; display:flex; flex-direction:column;">
    <div class="modal-header" style="display:flex; align-items:center; padding:10px 16px; border-bottom:1px solid #1a1a1a; gap:12px;">
      <span style="color:#00ff41; font-weight:bold; font-size:13px; white-space:nowrap;">[FILE VIEWER]</span>
      <span id="fv-file-path" style="color:#888; font-size:11px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
      <span id="fv-file-size" style="color:#666; font-size:10px; white-space:nowrap;"></span>
      <button class="btn btn-ghost btn-sm" style="font-size:10px; padding:3px 8px;"
              onclick="copyFileContent()">Copy</button>
      <button class="btn btn-ghost btn-sm" style="font-size:10px; padding:3px 8px;"
              onclick="toggleLineWrap()">Wrap</button>
      <button class="btn btn-ghost btn-sm" style="font-size:11px; padding:3px 8px;"
              onclick="closeFileViewer()">Close</button>
    </div>
    <div class="modal-body" id="fv-content-wrapper"
         style="flex:1; padding:0; overflow:auto; background:#050505; font-family:var(--font-mono); font-size:12px; line-height:1.5; position:relative;">
      <pre id="fv-content" style="margin:0; padding:12px 12px 12px 56px; white-space:pre; color:#ccc; tab-size:4; counter-reset:line; min-height:100%;"></pre>
    </div>
  </div>
</div>

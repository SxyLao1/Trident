<div id="metrics-panel"
     hx-get="/admin/metrics/data"
     hx-trigger="load delay:500ms, sse:registry_update"
     hx-target="#metrics-panel"
     hx-swap="innerHTML">

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-label">{{ _('Scan Total') }}</div>
            <div class="metric-value">0</div>
        </div>

        <div class="metric-card">
            <div class="metric-label">{{ _('High Risk') }}</div>
            <div class="metric-value safe" style="color: #00ff00;">
                0
            </div>
        </div>

        <div class="metric-card">
            <div class="metric-label">{{ _('Memory') }}</div>
            <div class="metric-value">0.0 MB</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">{{ _('Uptime') }}</div>
            <div class="metric-value">0.0 h</div>
        </div>
    </div>
</div>

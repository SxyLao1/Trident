<!DOCTYPE html>
<html>
<head>
  <title>Trident Dashboard</title>
  <meta charset="utf-8">
  <meta name="sse-token" content="{{ auth_header|safe }}">
  <meta name="csrf-token" content="{{ csrf_token() if csrf_token else '' }}">
  <meta name="sse-max-total-clients" content="{{ config.get('web_admin', {}).get('sse_max_total_clients', 20) }}">
  <meta name="sse-max-per-ip" content="{{ config.get('web_admin', {}).get('sse_max_clients_per_ip', 5) }}">
  <meta name="sse-log-levels" content="{{ config.get('web_admin', {}).get('sse_log_levels', ['INFO', 'ERROR', 'CRITICAL']) | tojson | safe }}">

  <!-- 拆分后的CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/vars.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>

  <!-- 拆分后的JS -->
  <script src="{{ url_for('static', filename='js/utils.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/sse-manager.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/cyber-effects.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/dashboard.js') }}" defer></script>
  <meta name="trident-version" content="{{ trident_version }}" hidden>
</head>
<body>
  <div class="app-shell">
    <!-- 顶部导航栏 -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-icon">▲</div>
        <span>TRIDENT</span>
        <span class="brand-sub">v1.8.0</span>
      </div>
      <div class="header-center" id="header-center" style="display:flex;align-items:center;gap:12px;flex:1;justify-content:center;">
        <!-- 页面工具栏由 JS 动态注入 -->
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <div id="sse-status-indicator" class="sse-status disconnected">
          <span class="dot"></span>
          <span class="status-label">OFF</span>
        </div>
        <button id="logout-btn" class="btn btn-danger btn-sm">
          <span>⏻</span> LOGOUT
        </button>
      </div>
    </header>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <div class="app-body">
      <!-- 侧边栏 -->
      <aside class="app-sidebar">
        <div class="sidebar-header">Navigation</div>
        <ul class="nav-menu">
          <li class="nav-item">
            <a class="nav-link active" data-path="dashboard_content" data-title="Dashboard">
              <span class="nav-icon">⌘</span>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-path="system" data-title="System Management">
              <span class="nav-icon">⬡</span>
              <span>System</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-path="account" data-title="Account">
              <span class="nav-icon">◐</span>
              <span>Account</span>
            </a>
          </li>
        </ul>
      </aside>

      <!-- 主内容区 -->
      <main class="app-main">
        <div class="page-header">
          <h1 class="page-title" id="page-title">Dashboard</h1>
          <div class="page-actions">
            <button class="btn btn-ghost btn-sm" onclick="refreshCurrent()">
              <span>↻</span> Refresh
            </button>
          </div>
        </div>
        <div class="content-scroll" id="main-content">
          <div class="empty-state">
            <div class="spinner"></div>
            <p>Initializing dashboard...</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- 模态框容器 -->
  <div id="yara-edit-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <span>Edit YARA Rule</span>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="yara-edit-body">
        <!-- HTMX loads content here -->
      </div>
    </div>
  </div>
<!-- YARA Upload Modal (always rendered, compact or not) -->
<div id="yara-upload-modal" class="modal-overlay">
  <div class="modal-box" style="max-width: 520px;">
    <div class="modal-header">
      <span>Upload YARA Rule</span>
      <button class="modal-close" onclick="TridentUtils.modal.hide('yara-upload-modal')">&times;</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:16px;">
      <div class="form-group">
        <label class="form-label">Select .yar file</label>
        <div class="file-drop-zone" id="yara-drop-zone"
             ondragover="event.preventDefault();this.classList.add('drag-over');"
             ondragleave="this.classList.remove('drag-over');"
             ondrop="handleYaraDrop(event)">
          <div class="file-drop-icon">📁</div>
          <p>Drag & drop YARA rule here</p>
          <p style="font-size:11px;color:var(--color-text-muted);">or click to browse</p>
          <input type="file" id="yara-file-input" accept=".yar" style="display:none;" onchange="handleYaraFileSelect(this)">
        </div>
        <div id="yara-file-info" style="display:none;" class="file-info-panel">
          <span class="file-info-name" id="yara-file-name"></span>
          <span class="file-info-size" id="yara-file-size"></span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Preview</label>
        <textarea id="yara-upload-preview" class="form-textarea" readonly
                  style="min-height:120px;font-family:var(--font-mono);font-size:12px;resize:none;"></textarea>
      </div>
      <div id="yara-upload-result" style="font-family:var(--font-mono);font-size:12px;min-height:24px;"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="TridentUtils.modal.hide('yara-upload-modal')">Cancel</button>
        <button class="btn btn-primary" id="yara-upload-btn" onclick="submitYaraUpload()" disabled>Upload</button>
      </div>
    </div>
  </div>
</div>

<script>
window._yaraShowUploadModal = function() {
  TridentUtils.modal.show('yara-upload-modal');
  document.getElementById('yara-file-input').value = '';
  document.getElementById('yara-upload-preview').value = '';
  document.getElementById('yara-upload-result').innerHTML = '';
  document.getElementById('yara-file-info').style.display = 'none';
  document.getElementById('yara-upload-btn').disabled = true;
};

document.getElementById('yara-drop-zone').addEventListener('click', function(e) {
  if (e.target !== document.getElementById('yara-file-input')) {
    document.getElementById('yara-file-input').click();
  }
});

function handleYaraDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files.length > 0) processYaraFile(files[0]);
}

function handleYaraFileSelect(input) {
  if (input.files.length > 0) processYaraFile(input.files[0]);
}

let _yaraUploadFile = null;

function processYaraFile(file) {
  _yaraUploadFile = file;
  if (!file.name.endsWith('.yar')) {
    TridentUtils.toast('Only .yar files allowed', 'error');
    return;
  }
  document.getElementById('yara-file-name').textContent = file.name;
  document.getElementById('yara-file-size').textContent = (file.size / 1024).toFixed(1) + ' KB';
  document.getElementById('yara-file-info').style.display = 'flex';

  const reader = new FileReader();
  reader.onload = function(e) {
    const content = e.target.result;
    document.getElementById('yara-upload-preview').value = content;
    document.getElementById('yara-upload-btn').disabled = false;
  };
  reader.readAsText(file);
}

function submitYaraUpload() {
  if (!_yaraUploadFile) return;
  const btn = document.getElementById('yara-upload-btn');
  const resultDiv = document.getElementById('yara-upload-result');
  btn.disabled = true;
  btn.textContent = 'Uploading...';
  resultDiv.innerHTML = '<span style="color:var(--color-info)">[INFO] Uploading...</span>';

  const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
  const formData = new FormData();
  formData.append('file', _yaraUploadFile);
  formData.append('csrf_token', csrfToken);

  fetch('/admin/yara/rules/upload', {
    method: 'POST',
    headers: {'X-CSRFToken': csrfToken},
    body: formData
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      resultDiv.innerHTML = '<span style="color:var(--color-safe)">[✓] ' + (data.message || 'Upload successful') + '</span>';
      TridentUtils.toast(data.message || 'Upload successful', 'success');
      setTimeout(() => {
        TridentUtils.modal.hide('yara-upload-modal');
        htmx.ajax('GET', '/admin/yara/rules', {target: '#main-content'});
      }, 800);
    } else {
      resultDiv.innerHTML = '<span style="color:var(--color-danger)">[✗] ' + (data.error || 'Upload failed') + '</span>';
      btn.disabled = false;
      btn.textContent = 'Upload';
    }
  })
  .catch(e => {
    resultDiv.innerHTML = '<span style="color:var(--color-danger)">[✗] Network error: ' + e.message + '</span>';
    btn.disabled = false;
    btn.textContent = 'Upload';
  });
}
</script>
</body>
</html>

<!-- v1.8.0: Dynamic config.toml editor -->
<div id="config-editor" style="display:flex; flex-direction:column; gap:16px;">
  <div style="display:flex; align-items:center; gap:12px;">
    <span style="color:#888; font-size:12px;">Config path: <code style="color:#ccc;" id="config-path">...</code></span>
    <span style="flex:1;"></span>
    <button class="btn btn-primary btn-sm" onclick="saveConfig()">Save Changes</button>
  </div>
  <div id="config-sections">
    <div class="empty-state"><div class="spinner"></div><p>Loading configuration...</p></div>
  </div>
</div>

<style>
.config-section { background:#0a0a0a; border:1px solid #1a1a1a; border-radius:4px; margin-bottom:12px; }
.config-section-header { display:flex; align-items:center; padding:10px 16px; cursor:pointer; border-bottom:1px solid #1a1a1a; }
.config-section-header:hover { background:#111; }
.config-section-header h4 { color:#00ff41; margin:0; font-size:13px; flex:1; }
.config-section-body { padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
.config-field { display:flex; align-items:center; gap:8px; padding:4px 0; }
.config-field label { color:#ccc; font-size:12px; min-width:180px; font-family:var(--font-mono); }
.config-field input[type="text"],
.config-field input[type="number"] { flex:1; background:#000; color:#ccc; border:1px solid #333; padding:4px 8px; font-size:12px; border-radius:3px; font-family:var(--font-mono); }
.config-field input[type="checkbox"] { accent-color:#00ff41; width:16px; height:16px; }
.config-info {
  display:inline-flex; align-items:center; justify-content:center;
  width:16px; height:16px; border-radius:50%; border:1px solid #666;
  color:#666; font-size:10px; font-weight:bold; cursor:help;
  position:relative; flex-shrink:0;
}
.config-info:hover { border-color:#00ff41; color:#00ff41; }
.config-info:hover::after {
  content:attr(data-tooltip);
  position:absolute; bottom:120%; left:50%; transform:translateX(-50%);
  background:#1a1a1a; color:#ccc; border:1px solid #00ff41; padding:6px 10px;
  font-size:11px; font-weight:normal; white-space:nowrap; border-radius:3px;
  z-index:10; pointer-events:none;
}
.config-saved { color:#00ff41; font-size:12px; display:none; }
</style>

<script>
var _configData = null;

// Load config on page init
(function() {
  fetch('/admin/settings/config/data')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      _configData = data;
      document.getElementById('config-path').textContent = data.path;
      renderConfig(data.sections);
    });
})();

function renderConfig(sections) {
  var container = document.getElementById('config-sections');
  var html = '';
  var secKeys = Object.keys(sections).sort();
  for (var i = 0; i < secKeys.length; i++) {
    var key = secKeys[i];
    var sec = sections[key];
    var collapsed = i > 4 ? ' style=\"display:none\"' : '';  // collapse sections beyond first 5
    html += '<div class=\"config-section\">';
    html += '<div class=\"config-section-header\" onclick=\"var b=this.nextElementSibling;b.style.display=b.style.display===\\'none\\'?\\'\\':\\'none\\'\"><h4>[' + key + ']</h4><span style=\"color:#666;font-size:10px;\">' + Object.keys(sec.fields).length + ' fields</span></div>';
    html += '<div class=\"config-section-body\"' + collapsed + '>';
    var fkeys = Object.keys(sec.fields).sort();
    for (var j = 0; j < fkeys.length; j++) {
      var fk = fkeys[j];
      var f = sec.fields[fk];
      html += '<div class=\"config-field\">';
      html += '<label>' + fk + '</label>';
      if (f.desc) {
        html += '<span class=\"config-info\" data-tooltip=\"' + f.desc.replace(/\"/g, '&quot;') + '\">i</span>';
      } else {
        html += '<span style=\"width:16px;\"></span>';
      }
      if (f.type === 'bool') {
        html += '<input type=\"checkbox\" data-key=\"' + key + '.' + fk + '\" ' + (f.value ? 'checked' : '') + ' onchange=\"markDirty()\">';
        html += '<span style=\"color:#888;font-size:11px;\">' + (f.value ? 'true' : 'false') + '</span>';
      } else if (f.type === 'int' || f.type === 'float') {
        html += '<input type=\"number\" value=\"' + f.value + '\" data-key=\"' + key + '.' + fk + '\" onchange=\"markDirty()\" style=\"max-width:200px;\">';
      } else if (f.type === 'array') {
        html += '<input type=\"text\" value=\"' + f.value.replace(/\"/g, '&quot;') + '\" data-key=\"' + key + '.' + fk + '\" onchange=\"markDirty()\">';
      } else {
        html += '<input type=\"text\" value=\"' + String(f.value).replace(/\"/g, '&quot;').replace(/</g, '&lt;') + '\" data-key=\"' + key + '.' + fk + '\" onchange=\"markDirty()\">';
      }
      html += '</div>';
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function markDirty() {
  var el = document.getElementById('config-saved');
  if (el) { el.style.display = 'none'; }
}

function saveConfig() {
  var changes = {};
  document.querySelectorAll('#config-sections input').forEach(function(inp) {
    var key = inp.dataset.key;
    if (!key) return;
    var val;
    if (inp.type === 'checkbox') val = inp.checked;
    else if (inp.type === 'number') val = parseFloat(inp.value) || 0;
    else val = inp.value;
    changes[key] = val;
  });

  fetch('/admin/settings/config/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name=\"csrf-token\"]')?.content || ''},
    body: JSON.stringify({changes: changes})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var el = document.getElementById('config-saved');
    if (data.success) {
      if (el) { el.style.display = ''; el.textContent = 'Saved OK'; }
    } else {
      if (el) { el.style.display = ''; el.textContent = 'Error: ' + (data.error || 'unknown'); el.style.color = '#ff4444'; }
    }
  });
}
</script>

<!-- v1.8.0: Threats — 检测记录 + 隔离管理 合并视图 -->
<div style="display: flex; flex-direction: column; height: 100%; gap: 0;">
  <!-- Tab navigation -->
  <div class="threats-tabs" style="display: flex; gap: 0; border-bottom: 1px solid #1a1a1a; padding: 0 16px;">
    <button class="threats-tab active" data-tab="active"
            style="background: none; border: none; color: #00ff41; font-family: var(--font-mono); font-size: 13px; padding: 10px 20px; cursor: pointer; border-bottom: 2px solid #00ff41;"
            onclick="switchThreatsTab('active')">
      ACTIVE THREATS
    </button>
    <button class="threats-tab" data-tab="quarantine"
            style="background: none; border: none; color: #666; font-family: var(--font-mono); font-size: 13px; padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent;"
            onclick="switchThreatsTab('quarantine')">
      QUARANTINE
    </button>
    <button class="threats-tab" data-tab="audit"
            style="background: none; border: none; color: #666; font-family: var(--font-mono); font-size: 13px; padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent;"
            onclick="switchThreatsTab('audit')">
      AUDIT LOG
    </button>
  </div>

  <!-- Active Threats -->
  <div id="threats-tab-active" class="threats-tab-content" style="flex: 1; overflow: hidden; display: flex;">
    <div id="threats-active-container" style="padding: 16px; flex: 1; min-height: 0; overflow-y: auto;"
         hx-get="/admin/records?compact=1"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="empty-state"><div class="spinner"></div><p>Loading records...</p></div>
    </div>
  </div>

  <!-- Quarantine (auto-loaded on Threats page load) -->
  <div id="threats-tab-quarantine" class="threats-tab-content" style="flex: 1; overflow: hidden; display: none;">
    <div id="threats-quarantine-container" style="padding: 16px; flex: 1; min-height: 0; overflow-y: auto;"
         hx-get="/admin/quarantine?status=quarantined"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="empty-state"><div class="spinner"></div><p>Loading quarantine...</p></div>
    </div>
  </div>

  <!-- Audit Log (auto-loaded on Threats page load) -->
  <div id="threats-tab-audit" class="threats-tab-content" style="flex: 1; overflow: hidden; display: none;">
    <div id="threats-audit-container" style="padding: 16px; flex: 1; min-height: 0; overflow-y: auto;"
         hx-get="/admin/records?audit=true&compact=1"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="empty-state"><div class="spinner"></div><p>Loading audit log...</p></div>
    </div>
  </div>
</div>

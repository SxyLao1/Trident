<!-- v1.8.0: Overview — 安全态势首页 -->
<div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 100%;">
  <!-- 安全报告面板 -->
  <div class="card" style="display: flex; flex-direction: column;">
    <div class="card-header">
      <span><span class="card-header-icon">◆</span> SECURITY REPORT</span>
    </div>
    <div class="card-body" style="flex: 1; padding: 16px; overflow-y: auto;" id="overview-stats"
         hx-get="/admin/dashboard_content"
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
      <div class="empty-state"><div class="spinner"></div><p>Loading...</p></div>
    </div>
  </div>

  <!-- 系统指标面板 -->
  <div class="card" style="display: flex; flex-direction: column;">
    <div class="card-header">
      <span><span class="card-header-icon">◆</span> SYSTEM METRICS</span>
      <span class="badge badge-info">Live</span>
    </div>
    <div class="card-body" style="flex: 1; padding: 16px; overflow-y: auto;" id="overview-metrics"
         hx-get="/admin/metrics/data"
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
      <div class="empty-state"><div class="spinner"></div><p>Loading metrics...</p></div>
    </div>
  </div>

  <!-- 活跃威胁（未隔离） -->
  <div class="card" style="display: flex; flex-direction: column;">
    <div class="card-header">
      <span><span class="card-header-icon">⚡</span> ACTIVE THREATS</span>
      <span class="badge badge-danger">Needs Attention</span>
    </div>
    <div class="card-body" style="flex: 1; padding: 0; overflow: hidden;">
      <div id="overview-active-threats" style="padding: 16px; flex: 1; min-height: 0; overflow-y: auto;"
           hx-get="/admin/records?compact=1"
           hx-trigger="load, every 30s"
           hx-swap="innerHTML">
        <div class="empty-state"><div class="spinner"></div><p>Loading records...</p></div>
      </div>
    </div>
  </div>

  <!-- 实时日志流 -->
  <div class="card" style="display: flex; flex-direction: column;">
    <div class="card-header" style="display: flex; align-items: center; gap: 8px;">
      <span style="flex: 1;"><span class="card-header-icon">◆</span> LIVE LOG STREAM</span>
      <input type="text" class="form-input" style="width: 140px; font-size: 10px; padding: 3px 6px;"
             placeholder="Quick filter..." oninput="filterLogStream()" id="log-filter-input">
      <span class="badge badge-info">SSE</span>
      <button class="btn btn-ghost btn-sm" style="font-size: 10px; padding: 3px 8px;"
              onclick="openLogAnalyzer()">Analyze</button>
    </div>
    <div class="card-body" style="flex: 1; padding: 16px; overflow-y: auto; font-family: var(--font-mono); font-size: 12px; line-height: 1.6;"
         id="live-log-stream">
      {{ log_history|safe if log_history else '<div class="empty-state"><p>Connecting to log stream...</p></div>' }}
    </div>
  </div>

<!-- v1.8.0: Log Analyzer Modal -->
<div id="log-analyzer-modal" class="modal-overlay" style="display:none; z-index:2000;" onclick="if(event.target===this)closeLogAnalyzer()">
  <div class="modal-container" style="width:95vw; height:90vh; max-width:1400px; display:flex; flex-direction:column;">
    <div class="modal-header" style="display:flex; align-items:center; padding:12px 20px; border-bottom:1px solid #1a1a1a;">
      <h3 style="color:#00ff41; margin:0; flex:1;">Log Analyzer</h3>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="text" class="form-input" style="width:200px; font-size:11px; padding:4px 8px;"
               placeholder="Search keyword..." oninput="filterLogAnalyzer()" id="analyzer-filter-input">
        <select id="analyzer-level-filter" onchange="filterLogAnalyzer()"
                style="background:#0a0a0a; color:#ccc; border:1px solid #333; padding:4px 8px; font-size:11px; border-radius:3px;">
          <option value="all">All</option>
          <option value="INFO">INFO</option>
          <option value="WARNING">WARNING</option>
          <option value="ERROR">ERROR</option>
          <option value="CRITICAL">CRITICAL</option>
        </select>
        <select id="analyzer-module-filter" onchange="filterLogAnalyzer()"
                style="background:#0a0a0a; color:#ccc; border:1px solid #333; padding:4px 8px; font-size:11px; border-radius:3px;">
          <option value="all">All</option>
          <option value="MONITOR">MONITOR</option>
          <option value="SCAN">SCAN</option>
          <option value="QUARANTINE">QUARANTINE</option>
          <option value="REGISTRY">REGISTRY</option>
          <option value="NOTIFIER">NOTIFIER</option>
          <option value="SECURITY">SECURITY</option>
          <option value="ALERT">ALERT</option>
        </select>
        <span style="font-size:10px; color:#666;" id="analyzer-count">0 lines</span>
        <button class="btn btn-ghost btn-sm" style="font-size:11px;" onclick="closeLogAnalyzer()">Close</button>
      </div>
    </div>
    <div class="modal-body" style="flex:1; padding:16px; overflow-y:auto; font-family:var(--font-mono); font-size:12px; line-height:1.7;"
         id="analyzer-log-content">
      <div class="empty-state"><p>Loading logs...</p></div>
    </div>
  </div>
</div>

<script>
// v1.8.0: Log filtering (lightweight, for quadrant view)
function filterLogStream() {
  var keyword = (document.getElementById('log-filter-input')?.value || '').toLowerCase();
  var container = document.getElementById('live-log-stream');
  if (!container) return;
  container.querySelectorAll('.log-line').forEach(function(el) {
    el.style.display = (keyword && el.textContent.toLowerCase().indexOf(keyword) < 0) ? 'none' : '';
  });
}

// v1.8.0: Full-screen log analyzer
function openLogAnalyzer() {
  var modal = document.getElementById('log-analyzer-modal');
  if (!modal) return;
  modal.style.display = 'flex';
  // Clone current log lines + live SSE into analyzer
  var source = document.getElementById('live-log-stream');
  var target = document.getElementById('analyzer-log-content');
  if (source && target) {
    target.innerHTML = source.innerHTML;
    target.scrollTop = target.scrollHeight;
  }
  // Start mirroring SSE to analyzer
  if (!window._analyzerObserver) {
    window._analyzerObserver = new MutationObserver(function() {
      var s = document.getElementById('live-log-stream');
      var t = document.getElementById('analyzer-log-content');
      if (s && t && document.getElementById('log-analyzer-modal').style.display !== 'none') {
        t.innerHTML = s.innerHTML;
        t.scrollTop = t.scrollHeight;
      }
    });
    if (source) window._analyzerObserver.observe(source, { childList: true, subtree: true });
  }
}

function closeLogAnalyzer() {
  var modal = document.getElementById('log-analyzer-modal');
  if (modal) modal.style.display = 'none';
}

function filterLogAnalyzer() {
  var keyword = (document.getElementById('analyzer-filter-input')?.value || '').toLowerCase();
  var level = document.getElementById('analyzer-level-filter')?.value || 'all';
  var module = document.getElementById('analyzer-module-filter')?.value || 'all';
  var container = document.getElementById('analyzer-log-content');
  if (!container) return;
  var visible = 0;
  container.querySelectorAll('.log-line').forEach(function(el) {
    var text = el.textContent;
    var show = true;
    if (keyword && text.toLowerCase().indexOf(keyword) < 0) show = false;
    if (level !== 'all' && text.toUpperCase().indexOf('[' + level + ']') < 0) show = false;
    if (module !== 'all' && text.indexOf('[' + module + ']') < 0) show = false;
    el.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  var countEl = document.getElementById('analyzer-count');
  if (countEl) countEl.textContent = visible + ' lines';
}
</script>
</div>

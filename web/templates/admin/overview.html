<!-- v1.8.0: Overview — 安全态势首页 -->
<div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 100%;">
  <!-- 安全报告面板 -->
  <div class="card" style="display: flex; flex-direction: column;">
    <div class="card-header">
      <span><span class="card-header-icon">◆</span> SECURITY REPORT</span>
    </div>
    <div class="card-body" style="flex: 1; padding: 16px; overflow-y: auto;" id="overview-stats"
         hx-get="/admin/dashboard_content"
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
      <div class="empty-state"><div class="spinner"></div><p>Loading...</p></div>
    </div>
  </div>

  <!-- 系统指标面板 -->
  <div class="card" style="display: flex; flex-direction: column;">
    <div class="card-header">
      <span><span class="card-header-icon">◆</span> SYSTEM METRICS</span>
      <span class="badge badge-info">Live</span>
    </div>
    <div class="card-body" style="flex: 1; padding: 16px; overflow-y: auto;" id="overview-metrics"
         hx-get="/admin/metrics/data"
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
      <div class="empty-state"><div class="spinner"></div><p>Loading metrics...</p></div>
    </div>
  </div>

  <!-- 活跃威胁（未隔离） -->
  <div class="card" style="display: flex; flex-direction: column;">
    <div class="card-header">
      <span><span class="card-header-icon">⚡</span> ACTIVE THREATS</span>
      <span class="badge badge-danger">Needs Attention</span>
    </div>
    <div class="card-body" style="flex: 1; padding: 0; overflow: hidden;">
      <div id="overview-active-threats" style="padding: 16px; flex: 1; min-height: 0; overflow-y: auto;"
           hx-get="/admin/records?compact=1"
           hx-trigger="load, every 30s"
           hx-swap="innerHTML">
        <div class="empty-state"><div class="spinner"></div><p>Loading records...</p></div>
      </div>
    </div>
  </div>

  <!-- 实时日志流 -->
  <div class="card" style="display: flex; flex-direction: column;">
    <div class="card-header">
      <span><span class="card-header-icon">◆</span> LIVE LOG STREAM</span>
      <span class="badge badge-info">SSE</span>
    </div>
    <!-- v1.8.0: Log filter bar -->
    <div style="display: flex; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #1a1a1a; align-items: center; flex-wrap: wrap;">
      <input type="text" class="form-input" style="flex: 1; min-width: 120px; max-width: 250px; font-size: 11px; padding: 4px 8px;"
             placeholder="Filter logs..." oninput="filterLogStream()" id="log-filter-input">
      <select id="log-level-filter" onchange="filterLogStream()"
              style="background: #0a0a0a; color: #ccc; border: 1px solid #333; padding: 4px 8px; font-size: 11px; font-family: var(--font-mono); border-radius: 3px;">
        <option value="all">All Levels</option>
        <option value="INFO">INFO</option>
        <option value="WARNING">WARNING</option>
        <option value="ERROR">ERROR</option>
        <option value="CRITICAL">CRITICAL</option>
      </select>
      <select id="log-module-filter" onchange="filterLogStream()"
              style="background: #0a0a0a; color: #ccc; border: 1px solid #333; padding: 4px 8px; font-size: 11px; font-family: var(--font-mono); border-radius: 3px;">
        <option value="all">All Modules</option>
        <option value="MONITOR">MONITOR</option>
        <option value="SCAN">SCAN</option>
        <option value="QUARANTINE">QUARANTINE</option>
        <option value="REGISTRY">REGISTRY</option>
        <option value="NOTIFIER">NOTIFIER</option>
        <option value="SECURITY">SECURITY</option>
        <option value="CONFIG">CONFIG</option>
        <option value="ALERT">ALERT</option>
        <option value="SSE">SSE</option>
      </select>
      <span style="font-size: 10px; color: #666;" id="log-visible-count">0 lines</span>
    </div>
    <div class="card-body" style="flex: 1; padding: 16px; overflow-y: auto; font-family: var(--font-mono); font-size: 12px; line-height: 1.6;"
         id="live-log-stream">
      {{ log_history|safe if log_history else '<div class="empty-state"><p>Connecting to log stream...</p></div>' }}
    </div>
  </div>

<script>
// v1.8.0: Client-side log filtering
var _logLines = [];
var _logMaxVisible = 500;

function filterLogStream() {
  var keyword = (document.getElementById('log-filter-input')?.value || '').toLowerCase();
  var level = document.getElementById('log-level-filter')?.value || 'all';
  var module = document.getElementById('log-module-filter')?.value || 'all';
  var container = document.getElementById('live-log-stream');
  if (!container) return;

  // Collect all current log lines
  var allLines = container.querySelectorAll('.log-line');
  if (allLines.length > 0 && _logLines.length === 0) {
    allLines.forEach(function(el) { _logLines.push({el: el, text: el.textContent}); });
  }

  var visible = 0;
  _logLines.forEach(function(item) {
    var text = item.text;
    var show = true;
    if (keyword && text.toLowerCase().indexOf(keyword) < 0) show = false;
    if (level !== 'all' && text.indexOf('[' + level + ']') < 0 && text.toUpperCase().indexOf(level) < 0) show = false;
    if (module !== 'all' && text.indexOf('[' + module + ']') < 0) show = false;
    item.el.style.display = show ? '' : 'none';
    if (show) visible++;
  });

  var countEl = document.getElementById('log-visible-count');
  if (countEl) countEl.textContent = visible + ' lines';

  // Cap visible entries for performance
  if (visible > _logMaxVisible) {
    var shown = 0;
    _logLines.forEach(function(item) {
      if (item.el.style.display !== 'none') {
        shown++;
        if (shown > _logMaxVisible) item.el.style.display = 'none';
      }
    });
    if (countEl) countEl.textContent = _logMaxVisible + ' / ' + visible + ' lines (capped)';
  }
}

// Intercept new SSE log lines to apply current filter
var _origLogObserver = new MutationObserver(function(mutations) {
  mutations.forEach(function(m) {
    m.addedNodes.forEach(function(node) {
      if (node.classList && node.classList.contains('log-line')) {
        _logLines.push({el: node, text: node.textContent});
        if (_logLines.length > 1000) _logLines.shift();  // memory cap
        // Apply current filter to new line
        var keyword = (document.getElementById('log-filter-input')?.value || '').toLowerCase();
        var level = document.getElementById('log-level-filter')?.value || 'all';
        if (keyword && node.textContent.toLowerCase().indexOf(keyword) < 0) node.style.display = 'none';
        if (level !== 'all' && node.textContent.indexOf('[' + level + ']') < 0) node.style.display = 'none';
      }
    });
  });
});
var logContainer = document.getElementById('live-log-stream');
if (logContainer) _origLogObserver.observe(logContainer, { childList: true });
</script>
</div>

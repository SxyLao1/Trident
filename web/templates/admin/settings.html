<!-- v1.8.0: Settings -->
<div style="padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">

  <!-- Account -->
  <div class="card">
    <div class="card-header"><span><span class="card-header-icon">◆</span> ACCOUNT</span></div>
    <div class="card-body" style="padding: 16px;"
         hx-get="/admin/account"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="empty-state"><div class="spinner"></div><p>Loading...</p></div>
    </div>
  </div>

  <!-- System -->
  <div class="card" style="display: flex; flex-direction: column;">
    <div class="card-header"><span><span class="card-header-icon">◆</span> SYSTEM</span></div>
    <div class="card-body" style="padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px;">
      <button class="btn btn-ghost btn-sm" style="text-align: left; justify-content: flex-start;"
              onclick="openSystemModal('registry')">Registry Status</button>
      <button class="btn btn-ghost btn-sm" style="text-align: left; justify-content: flex-start;"
              onclick="openSystemModal('wal')">WAL Management</button>
      <button class="btn btn-ghost btn-sm" style="text-align: left; justify-content: flex-start;"
              onclick="openSystemModal('session')">Session Management</button>
      <button class="btn btn-ghost btn-sm" style="text-align: left; justify-content: flex-start;"
              onclick="openSystemModal('config')">Config Reload</button>
    </div>
  </div>

  <!-- Notifications (full width) -->
  <div class="card" style="grid-column: 1 / -1;">
    <div class="card-header"><span><span class="card-header-icon">◆</span> NOTIFICATIONS</span></div>
    <div class="card-body" style="padding: 16px;" id="settings-notify"
         hx-get="/admin/settings/notifications"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="empty-state"><div class="spinner"></div><p>Loading notification settings...</p></div>
    </div>
  </div>
</div>

<!-- System Modal -->
<div id="system-modal" class="modal-overlay" style="display:none; z-index:2000;" onclick="if(event.target===this)closeSystemModal()">
  <div class="modal-container" style="width:700px; max-height:80vh; display:flex; flex-direction:column;">
    <div class="modal-header" style="display:flex; align-items:center; padding:12px 20px; border-bottom:1px solid #1a1a1a;">
      <h3 style="color:#00ff41; margin:0; flex:1;" id="system-modal-title">System</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeSystemModal()">Close</button>
    </div>
    <div class="modal-body" id="system-modal-body" style="flex:1; padding:20px; overflow-y:auto; min-height:300px;">
      <div class="empty-state"><div class="spinner"></div><p>Loading...</p></div>
    </div>
  </div>
</div>

<script>
var _systemUrls = {
  registry: '/admin/system/registry_panel',
  wal: '/admin/system/wal_panel',
  session: '/admin/system/session_panel',
  config: '/admin/system/config_panel'
};
var _systemTitles = {
  registry: 'Registry Status',
  wal: 'WAL Management',
  session: 'Session Management',
  config: 'Config Reload'
};

function openSystemModal(type) {
  var modal = document.getElementById('system-modal');
  var title = document.getElementById('system-modal-title');
  var body = document.getElementById('system-modal-body');
  if (!modal || !body) return;
  modal.style.display = 'flex';
  modal.style.visibility = 'visible';
  modal.style.opacity = '1';
  modal.classList.add('active');
  if (title) title.textContent = _systemTitles[type] || type;
  body.innerHTML = '<div class=\"empty-state\"><div class=\"spinner\"></div><p>Loading...</p></div>';
  if (_systemUrls[type]) {
    htmx.ajax('GET', _systemUrls[type], {target: '#system-modal-body', swap: 'innerHTML'});
  }
}

function closeSystemModal() {
  var modal = document.getElementById('system-modal');
  if (!modal) return;
  modal.style.display = 'none';
  modal.style.visibility = 'hidden';
  modal.style.opacity = '0';
  modal.classList.remove('active');
}
</script>

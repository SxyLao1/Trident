[logging.flask]
flask_log_enabled = true
flask_log_path = "logs/Trident/access.log"
flask_log_rotation_mb = 10
flask_log_backup_count = 5

[thresholds]
initial_alert_cooldown_seconds = 60
high_frequency_threshold = 10
high_frequency_cooldown_seconds = 300
circuit_breaker_threshold = 10
cooldown_alpha = 0.1
cooldown_beta = 1.5
cooldown_gamma = 1.2
cooldown_delta = 1.3

[thresholds.visual_alert]
warning_threshold = "1  # 1个就警告"
critical_threshold = "3  # 3个就严重"

[filesizes]
wal_rotate_threshold_mb = 10
registry_compact_days = 30
wal_cleanup_days = 7
wal_cleanup_count = 20
max_scan_file_size_mb = 5
magic_detection_size_mb = 10
log_rotation_size_mb = 100
log_backup_count = 5
max_rule_file_size_kb = 100

[queues]
alert_queue_maxsize = 0
registry_save_interval = 60

[paths]
yara_rules_path = "rules/webshell"
monitor_extensions = [
    ".php",
    ".asp",
    ".aspx",
    ".jsp",
    ".jspx",
]
log_base_dir = "logs"
data_dir = "data"

[timeouts]
http_timeout = 10
config_reload_delay = 10
scan_timeout = 30

[api]
health_check_port = 8080
health_check_host = "127.0.0.1"

[notifier]
enabled = "true  # CI 环境关闭，本地运行时设为 true"

[notifier.wechat]
enabled = true
send_key = "your_serverchan_key_here"
verify_ssl = false
timeout = 10
channel = 9
noip = false

[notifier.email]
enabled = true
smtp_host = "smtp.163.com"
smtp_port = 465
username = ""
password = "your_smtp_password_here"
from_addr = ""
to_addrs = [
    "",
]
use_tls = false
use_ssl = true
timeout = 30

[notifier.webhook]
enabled = false

[storage]
backend = "\"both\"   # 双写模式: JSON兜底 + SQLite优先读"
db_path = "data/trident.db"

[plugins]
enabled = "true    # v1.9.5: 启用插件系统"
builtin = "["

[plugins.stdout_logger]
color = true
verbose = false

[plugins.modsecurity]
enabled = false
audit_log_path = "/var/log/modsec_audit.log"
poll_interval = 5
min_score = 5

[plugins.cloudflare]
enabled = false
zone_id = ""
api_token = ""
poll_interval = 60
lookback_minutes = 5

[plugins.aws_waf]
enabled = false
region = "us-east-1"
web_acl_arn = ""
log_source = "cloudwatch"
log_group = "/aws/waf/logs"
poll_interval = 300

[plugins.syslog_waf]
enabled = false
host = "0.0.0.0"
port = 514
format = "cef"

[siem]
enabled = true
format = "json_lines"
export_file = "data/siem/events.jsonl"
rotate_mb = 100
syslog_host = ""
syslog_port = 514
syslog_protocol = "udp"
include_raw_sample = false

[scanner.yara]
enabled = true

["[ip_blocker"."devices]"]
name = "Stdout Logger"
type = "stdout"

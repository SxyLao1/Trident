[system]
version = "1.9.5-dev"
release_date = "TBD"
project_root = "\".\" # 项目根目录（辅助配置）"

[website]
name = "Website-PhpStudy"
path = "E:/Software/phpstudy_pro/WWW"
port = 80
enabled = true

[website.log_config]
access_log_path = "E:/Software/phpstudy_pro/Extensions/Nginx1.25.2/logs/access.log"
filter_internal_ip = false
log_monitor_enabled = true

[website.scan_options]
exclude_dirs = [
    "cache",
    "logs",
    "temp",
    "data",
]
exclude_files = [
    "*.log",
    "*.cache",
]
debug_mode = false

[web_admin]
enabled = true
host = "\"127.0.0.1\"  # 生产环境建议绑定内网IP"
port = 8080
username = "admin"
password_hash = "scrypt:32768:8:1$nJZif7Fjw1D7xuoR$b83dacf637039342acaa49152fa8736fd9a4ef18d0ff5e24233cc62bfc76bde458698d5368d7070dfc6a1eb9f9d5f0fede8da4241c0918d8bfd053246b70d2d6"
allowed_ips = "[\"127.0.0.1\"]  # v1.7.1新增：IP白名单"
sse_log_levels = "[\"INFO\", \"ERROR\", \"CRITICAL\"]  # 前端显示允许的日志级别"
items_per_page = "6  # 可疑清单每页条数"
yara_items_per_page = "10  # YARA规则每页条数"
session_items_per_page = "20  # Session列表每页条数"
config_items_per_page = "10   # 配置历史每页条数"
session_type = "\"filesystem\"  # 存储类型：filesystem/redis"
session_dir = "\"data/sessions\"  # 会话文件存储路径"
session_lifetime = "3600        # Session有效期（秒）"
session_permanent = "false      # 关闭浏览器自动过期"
sse_max_clients_per_ip = "5          # 单个IP最大连接数（默认5）"
sse_max_total_clients = "20          # 全局最大连接数（默认20）"

[waf_source]
enabled = true
type = "\"mock\"    # mock | chaitin | aliyun"
url = "http://127.0.0.1:8081/api/events"
poll_interval = "10  # 轮询间隔（秒）"
dest_ips = "[]  # 例如: [\"203.0.113.5\", \"10.0.1.100\"]"

[management]
ips = "[\"127.0.0.1\", \"::1\"]  # 本机回环地址，可追加内网管理段如 \"192.168.1.0/24\""

[profiling]
time_window_hours = "4  # 1=精细 4=默认 24=粗粒度 72=长期追踪"

[ip_blocker]
enabled = true
auto_block_enabled = false
auto_block_min_score = "0.8   # 触发自动封禁的最低风险分 (0.0-1.0)"
devices = [
    { name = "Stdout Logger", type = "stdout" },
]

[quarantine]
auto_quarantine_enabled = false

[security]
csrf_enabled = "true  # v1.7.1新增：CSRF开关"
csrf_exclude_paths = "[\"/api/v1/health\"]  # 排除健康检查"
secret_key = "change_this_to_a_random_32_char_string_in_production"

[registry]
async_save_enabled = true
async_save_interval_seconds = "60  # 暂时硬编码，未调用，每60秒批量保存一次"

[registry.audit]
retention_days = 30
auto_compact_enabled = true
audit_view_enabled = true

[monitor]
windows_verify_delay_ms = 50
dir_cache_size = 100
dir_cache_ttl = 60
dir_cache_timeout_seconds = 60

[logging]
level = "\"INFO\"  # 控制Python logger过滤级别"
encoding = "utf-8"


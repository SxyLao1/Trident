[system]
version = "1.9.5-dev"
release_date = "TBD"

project_root = "." # 项目根目录（辅助配置）

[website]
name = "Website-PhpStudy"
path = "E:/Software/phpstudy_pro/WWW"
port = 80
enabled = true

[web_admin]
enabled = true
host = "127.0.0.1"  # 生产环境建议绑定内网IP
port = 8080
username = "admin"
# 密码哈希生成命令：python -c "from werkzeug.security import generate_password_hash; print(generate_password_hash('你的密码'))"
password_hash = "${TRIDENT_PASSWORD_HASH:-}"  # v1.7.9: 空默认值，强制从.env或环境变量读取
allowed_ips = ["127.0.0.1"]  # v1.7.1新增：IP白名单
sse_log_levels = ["INFO", "ERROR", "CRITICAL"]  # 前端显示允许的日志级别
items_per_page = 6  # 可疑清单每页条数
yara_items_per_page = 10  # YARA规则每页条数
session_items_per_page = 20  # Session列表每页条数
config_items_per_page = 10   # 配置历史每页条数
session_type = "filesystem"  # 存储类型：filesystem/redis
session_dir = "data/sessions"  # 会话文件存储路径
session_lifetime = 3600        # Session有效期（秒）
session_permanent = false      # 关闭浏览器自动过期
# 新增SSE连接限制配置
sse_max_clients_per_ip = 5          # 单个IP最大连接数（默认5）
sse_max_total_clients = 20          # 全局最大连接数（默认20）

# ============================================================================
# v1.8.1: WAF 事件源配置（画像引擎数据来源）
# ============================================================================
[waf_source]
enabled = true
type = "mock"    # mock | chaitin | aliyun
url = "http://127.0.0.1:8081"   # v1.9.5: 指向 Anteumbra WAF Proxy
poll_interval = 10  # 轮询间隔（秒）

# v1.9.0: 目的IP过滤——WAF在出口抓全流量时，只分析打向本机的攻击
# 空列表 = 自动探测本机非回环IP。手动填写则使用指定IP列表。
dest_ips = []  # 例如: ["203.0.113.5", "10.0.1.100"]

# ============================================================================
# v1.9.0: 管理IP白名单（不参与画像，但攻击行为仍然告警）
# ============================================================================
[management]
# 管理员/安全设备IP——这些IP的操作不参与画像聚类
# 但如果这些IP触发了检测规则（如WebShell扫描），仍然发送告警
ips = ["127.0.0.1", "::1"]  # 本机回环地址，可追加内网管理段如 "192.168.1.0/24"

# ============================================================================
# v1.9.0: 画像时间窗口（小时）
# ============================================================================
[profiling]
time_window_hours = 4  # 1=精细 4=默认 24=粗粒度 72=长期追踪

# ============================================================================
# v1.8.2: IP 封禁引擎
# ============================================================================
[ip_blocker]
# v1.9.0: 启用 IP 封禁引擎 + 台账记录
enabled = true

# 自动封禁：高危画像关联 IP 自动广播到所有设备（关闭则仅手动触发）
# 建议：先在测试环境验证设备连通性，再开启
auto_block_enabled = false
auto_block_min_score = 0.8   # 触发自动封禁的最低风险分 (0.0-1.0)

# ---- 封禁设备列表 ----
# Trident 将封禁决策同时广播到下面所有设备。
# 设备类型说明：
#   stdout = 仅终端日志输出（默认，开发/演示用）
#   mock   = 内存黑名单（测试用，重启丢失）
#   http   = 通过 HTTP POST 对接真实 WAF/FW API
#
# 对接真实设备示例（取消注释并修改）：
#   [[ip_blocker.devices]]
#   name = "Production WAF"
#   type = "http"
#   url = "https://waf.company.com/api/block"      # WAF 封禁接口地址
#   api_key = "${TRIDENT_WAF_API_KEY:-}"            # API 密钥从 .env 读取
#
# HTTP 设备请求格式（Trident 自动发送）：
#   POST {url}
#   Content-Type: application/json
#   Authorization: Bearer {api_key}
#   Body: {"ip":"1.2.3.4", "comment":"Trident: webshell upload (profile: a1b2c3d4)", "permanent":false, "duration":86400, "risk_score":0.95}

[[ip_blocker.devices]]
name = "Stdout Logger"
type = "stdout"

# ============================================================================
# v1.9.0: 隔离总开关（测试时可关闭，避免文件被移走）
# ============================================================================
[quarantine]
# 是否自动隔离检测到的WebShell（默认关闭，生产环境谨慎开启）
auto_quarantine_enabled = false

[security]
csrf_enabled = true  # v1.7.1新增：CSRF开关
csrf_exclude_paths = ["/api/v1/health"]  # 排除健康检查
secret_key = "${TRIDENT_SECRET_KEY:-}"  # v1.7.9: 空默认值，强制从.env或环境变量读取

[registry]
async_save_enabled = true
async_save_interval_seconds = 60  # 暂时硬编码，未调用，每60秒批量保存一次

[registry.audit]
# 审计模式：保留已删除记录天数
retention_days = 30
# 自动压缩：删除超过N天的记录
auto_compact_enabled = true
# 审计视图允许查看已删除记录
audit_view_enabled = true

[monitor]
# Windows平台目录验证延迟 (毫秒)
windows_verify_delay_ms = 50
dir_cache_size = 100
dir_cache_ttl = 60
dir_cache_timeout_seconds = 60.0

[system]
version = "1.7.8"
name = "Trident"
debug = false
secret_key = "change-me-in-production"

[website]
path = "/var/www/html"

[monitor]
enabled = true
interval = 5

[wal]
enabled = true
batch_size = 100

[alert]
enabled = true
webhook_url = ""

[web]
host = "127.0.0.1"
port = 8080
allowed_ips = ["127.0.0.1"]
admin_username = "admin"
admin_password_hash = "$scrypt$..."

[log]
level = "INFO"
max_size = 10485760
backup_count = 5
